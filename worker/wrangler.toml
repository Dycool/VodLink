# VodLink session matchmaker Worker.
#
# Before first deploy:
#   1. npm install
#   2. npx wrangler d1 create vodlink         # copy the printed database_id below
#   3. npm run db:init:remote                 # apply schema.sql to the remote D1
#   4. set GOOGLE_CLIENT_ID below to the OAuth client ID used by the desktop app
#   5. npm run deploy
name = "vodlink"
main = "src/index.ts"
compatibility_date = "2026-06-28"

# Cheap edge-local shield applied before D1 and JWT verification. The Worker
# also enforces stricter account-wide D1 limits after authentication.
[[ratelimits]]
name = "EDGE_RATE_LIMITER"
namespace_id = "41001"

[ratelimits.simple]
limit = 20
period = 60

# The Google OAuth client ID the desktop app signs in with. The Worker only
# accepts ID tokens whose `aud` matches this value. Not a secret.
[vars]
GOOGLE_CLIENT_ID = "682238509762-ejh37d898kcl2616k8atmeo095o42plk.apps.googleusercontent.com"

# One D1 database holds the transient `sessions` table (see schema.sql).
# Replace database_id with the id printed by `wrangler d1 create vodlink`.
[[d1_databases]]
binding = "DB"
database_name = "vodlink"
database_id = "e08bd51c-440f-4df4-b9b0-ac4dbe0a010f"
