<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>VodLink Player</title>
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://www.youtube-nocookie.com">
  <link rel="preconnect" href="https://i.ytimg.com">
  <link rel="preconnect" href="https://s.ytimg.com">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #07080b; overflow: hidden; }
    #players { position: fixed; inset: 0; width: 100vw; height: 100vh; background: #07080b; overflow: hidden; }
    .playerSlot, .playerSlot iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #07080b; }
    .playerSlot { display: block; opacity: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .playerSlot.active { opacity: 1; pointer-events: auto; z-index: 1; }
    #overlay {
      position: fixed; inset: 0; display: none; place-items: center;
      color: #8d94a5; font: 16px sans-serif; text-align: center; padding: 24px;
      background: rgba(7, 8, 11, 0.92); z-index: 10;
    }
  </style>
</head>
<body>
  <div id="players"></div>
  <div id="overlay">Select a VOD to watch</div>

  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script>
    let apiReady = false;
    let bridge = null;
    let pendingLoad = null;      // { videoId, seek, hostIndex }
    let pendingCache = [];       // video ids requested before the API is ready
    let activeId = '';
    let lastLoad = null;
    let retryCount = 0;
    let retryTimer = null;
    let reportTimer = null;
    let apiTimer = null;
    let nextSlot = 1;
    const players = new Map();   // videoId -> { player, div, ready, pendingSeek, lastUsed, hostIndex, raw }
    const maxCachedPlayers = 6;
    const playerHosts = ['https://www.youtube.com', 'https://www.youtube-nocookie.com'];
    const appOrigin = (window.location.origin && window.location.origin !== 'null')
      ? window.location.origin
      : 'https://vodlink.app';

    function showOverlay(text) {
      const o = document.getElementById('overlay');
      if (text) { o.textContent = text; o.style.display = 'grid'; }
      else { o.style.display = 'none'; }
    }

    function normalizeIds(ids) {
      if (!ids) return [];
      if (Array.isArray(ids)) return ids.map(String).filter(Boolean);
      if (typeof ids === 'string') return ids.split(',').map(s => s.trim()).filter(Boolean);
      try { return Array.from(ids).map(String).filter(Boolean); } catch (_) { return []; }
    }

    function validYouTubeId(videoId) {
      return /^[A-Za-z0-9_-]{6,}$/.test(String(videoId || '').trim());
    }

    function slotFor(videoId) {
      return players.get(videoId) || null;
    }

    function destroyPlayer(videoId) {
      const slot = slotFor(videoId);
      if (!slot) return;
      try { if (slot.player && slot.player.destroy) slot.player.destroy(); } catch (_) {}
      try { if (slot.div) slot.div.remove(); } catch (_) {}
      players.delete(videoId);
      if (activeId === videoId) activeId = '';
    }

    function evictCache() {
      if (players.size <= maxCachedPlayers) return;
      const candidates = Array.from(players.entries())
        .filter(([id]) => id !== activeId)
        .sort((a, b) => (a[1].lastUsed || 0) - (b[1].lastUsed || 0));
      while (players.size > maxCachedPlayers && candidates.length) {
        const [id] = candidates.shift();
        destroyPlayer(id);
      }
    }

    function makeSlot(videoId) {
      const div = document.createElement('div');
      div.className = 'playerSlot';
      div.id = 'yt-slot-' + (nextSlot++);
      document.getElementById('players').appendChild(div);
      const slot = { player: null, div, ready: false, pendingSeek: 0, lastUsed: Date.now(), hostIndex: 0, raw: false };
      players.set(videoId, slot);
      return slot;
    }

    function createPlayer(videoId, preferredSeek, autoplay, hostIndex) {
      const host = playerHosts[Math.abs(hostIndex || 0) % playerHosts.length];
      const existing = slotFor(videoId);
      if (existing && !existing.raw && existing.hostIndex === hostIndex) {
        existing.lastUsed = Date.now();
        if (typeof preferredSeek === 'number') existing.pendingSeek = preferredSeek;
        return existing;
      }
      if (existing) destroyPlayer(videoId);

      const div = document.createElement('div');
      div.className = 'playerSlot';
      div.id = 'yt-slot-' + (nextSlot++);
      document.getElementById('players').appendChild(div);

      const slot = { player: null, div, ready: false, pendingSeek: preferredSeek || 0, lastUsed: Date.now(), hostIndex: hostIndex || 0, raw: false };
      players.set(videoId, slot);

      slot.player = new YT.Player(div.id, {
        host,
        width: '100%', height: '100%', videoId,
        playerVars: {
          autoplay: autoplay ? 1 : 0,
          controls: 1, rel: 0, modestbranding: 1, playsinline: 1, enablejsapi: 1,
          iv_load_policy: 3, fs: 1, origin: appOrigin, widget_referrer: appOrigin + '/',
          start: Math.max(0, Math.floor(slot.pendingSeek || 0)),
        },
        events: {
          onReady: function () {
            slot.ready = true;
            if (activeId === videoId) {
              seekAndPlay(videoId, slot.pendingSeek || 0);
            }
          },
          onStateChange: function (e) { onStateChange(videoId, e); },
          onError: function (e) { onPlayerError(videoId, e); },
          onAutoplayBlocked: onAutoplayBlocked,
        },
      });

      evictCache();
      return slot;
    }

    function rawEmbedUrl(videoId, seek, hostIndex) {
      const host = playerHosts[Math.abs(hostIndex || 0) % playerHosts.length];
      const qs = new URLSearchParams({
        autoplay: '1', controls: '1', rel: '0', modestbranding: '1', playsinline: '1',
        fs: '1', start: String(Math.max(0, Math.floor(seek || 0))), origin: appOrigin,
      });
      return host + '/embed/' + encodeURIComponent(videoId) + '?' + qs.toString();
    }

    function createRawIframe(videoId, seek, hostIndex) {
      destroyPlayer(videoId);
      const slot = makeSlot(videoId);
      slot.raw = true;
      slot.ready = true;
      slot.pendingSeek = Math.max(0, Number(seek || 0));
      slot.rawStartedAt = Date.now();
      slot.hostIndex = hostIndex || 0;

      const iframe = document.createElement('iframe');
      iframe.src = rawEmbedUrl(videoId, slot.pendingSeek, slot.hostIndex);
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen';
      iframe.referrerPolicy = 'strict-origin-when-cross-origin';
      iframe.allowFullscreen = true;
      slot.div.appendChild(iframe);
      setActive(videoId);
      showOverlay(null);
      startReporting();
      return slot;
    }

    function setActive(videoId) {
      players.forEach((slot, id) => {
        if (id === videoId) {
          slot.div.classList.add('active');
        } else {
          slot.div.classList.remove('active');
          try { if (slot.player) slot.player.pauseVideo(); } catch (_) {}
        }
      });
      activeId = videoId;
    }

    function seekAndPlay(videoId, seek) {
      const slot = slotFor(videoId);
      if (!slot) return;
      slot.lastUsed = Date.now();
      const start = Math.max(0, Number(seek || 0));
      if (slot.raw) {
        createRawIframe(videoId, start, slot.hostIndex || 0);
        return;
      }
      if (!slot.player) return;
      try {
        if (slot.ready) {
          slot.player.seekTo(start, true);
          slot.player.playVideo();
        } else {
          slot.pendingSeek = start;
        }
      } catch (_) {
        showOverlay('Could not load this VOD inside the app.');
      }
    }

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    tag.onerror = function () {
      showOverlay('Could not load the YouTube embedded player API. Check network access inside Qt WebEngine.');
    };
    document.head.appendChild(tag);
    apiTimer = setTimeout(() => {
      if (!apiReady) {
        showOverlay('YouTube embedded player is still loading. If it stays here, Qt WebEngine could not reach youtube.com.');
      }
    }, 10000);

    window.onYouTubeIframeAPIReady = function () {
      apiReady = true;
      if (apiTimer) { clearTimeout(apiTimer); apiTimer = null; }
      cacheVideos(pendingCache);
      pendingCache = [];
      if (pendingLoad) {
        doLoad(pendingLoad.videoId, pendingLoad.seek, false, pendingLoad.hostIndex || 0);
        pendingLoad = null;
      }
    };

    function onAutoplayBlocked() {
      showOverlay('Click the player to start playback. The embedded browser blocked autoplay with audio.');
    }

    function onPlayerError(videoId, e) {
      const code = e && typeof e.data !== 'undefined' ? String(e.data) : 'unknown';
      // A hidden/preloaded iframe that errors should never be reused later. This
      // was the common poison path for YouTube error 5: cache first, fail hidden,
      // then clicking the VOD reused the already-broken player.
      if (videoId !== activeId) {
        destroyPlayer(videoId);
        return;
      }
      if (code === '153') {
        showOverlay('YouTube rejected the embedded player configuration (error 153).');
        return;
      }

      if (lastLoad && retryCount < 20) {
        retryCount += 1;
        const isHtml5Error = code === '5';
        if (isHtml5Error && retryCount >= 5) {
          showOverlay('YouTube\'s IFrame API kept returning HTML5 error 5. Trying a plain embed iframe...');
          createRawIframe(lastLoad.videoId, lastLoad.seek, retryCount % playerHosts.length);
          return;
        }

        const waitMs = isHtml5Error ? 1500 : (retryCount < 4 ? 5000 : 15000);
        const nextHost = isHtml5Error ? ((lastLoad.hostIndex || 0) + 1) : (lastLoad.hostIndex || 0);
        const reason = isHtml5Error
          ? 'YouTube\'s HTML5 player failed to initialize in the embedded browser'
          : 'YouTube says this VOD is not embeddable yet';
        showOverlay(reason + ' (error ' + code + '). Rebuilding player in '
          + Math.round(waitMs / 1000) + 's...');
        destroyPlayer(videoId);
        if (retryTimer) clearTimeout(retryTimer);
        retryTimer = setTimeout(() => {
          retryTimer = null;
          if (lastLoad) doLoad(lastLoad.videoId, lastLoad.seek, true, nextHost);
        }, waitMs);
        return;
      }
      showOverlay('This VOD is unavailable in the embedded player (YouTube error '
        + code + '). It may still be processing, private, or embedding may still be disabled.');
    }

    function onStateChange(videoId, e) {
      if (videoId !== activeId) return;
      if (e.data === YT.PlayerState.PLAYING) {
        retryCount = 0;
        if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
        showOverlay(null);
        startReporting();
      } else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
        stopReporting();
      }
    }

    function startReporting() {
      if (reportTimer) return;
      reportTimer = setInterval(() => {
        const slot = slotFor(activeId);
        if (!bridge || !slot) return;
        if (slot.raw) {
          const estimate = (slot.pendingSeek || 0) + Math.max(0, Date.now() - (slot.rawStartedAt || Date.now())) / 1000.0;
          try { bridge.onTimeUpdate(estimate); } catch (_) {}
          return;
        }
        if (slot.player && slot.player.getCurrentTime) {
          try { bridge.onTimeUpdate(slot.player.getCurrentTime() || 0); } catch (_) {}
        }
      }, 200);
    }
    function stopReporting() {
      if (reportTimer) { clearInterval(reportTimer); reportTimer = null; }
    }

    function doLoad(videoId, seek, isRetry, hostIndex) {
      videoId = String(videoId || '').trim();
      if (!videoId) { showOverlay('Select a VOD to watch'); return; }
      if (!validYouTubeId(videoId)) { showOverlay('This VOD has an invalid YouTube id.'); return; }
      const start = Math.max(0, Number(seek || 0));
      if (!apiReady || typeof YT === 'undefined' || !YT.Player) {
        pendingLoad = { videoId, seek: start, hostIndex: hostIndex || 0 };
        return;
      }
      if (!isRetry) {
        retryCount = 0;
        if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
      }
      lastLoad = { videoId, seek: start, hostIndex: hostIndex || 0 };
      showOverlay(null);
      createPlayer(videoId, start, true, hostIndex || 0);
      setActive(videoId);
      seekAndPlay(videoId, start);
    }

    function cacheVideos(ids) {
      // Do not create hidden YouTube players here. Hidden preloading looked smooth
      // on paper but caused exactly the bad behavior users saw: YouTube error 5 can
      // happen while the iframe is inactive, and reusing that poisoned player later
      // keeps the embed broken. Keeping successful players warm after first play is
      // safe; eagerly instantiating unseen iframes is not.
      pendingCache = Array.from(new Set(pendingCache.concat(normalizeIds(ids))));
    }

    window.vodlink = {
      loadVideo: function (videoId, seek) { doLoad(videoId, seek, false, 0); },
      seek: function (seconds) { seekAndPlay(activeId, Math.max(0, Number(seconds || 0))); },
      play: function () { const s = slotFor(activeId); if (s && s.player) s.player.playVideo(); },
      pause: function () { const s = slotFor(activeId); if (s && s.player) s.player.pauseVideo(); },
      message: function (text) { showOverlay(text); },
      cacheVideos: cacheVideos,
    };

    new QWebChannel(qt.webChannelTransport, function (channel) {
      bridge = channel.objects.bridge;
      if (bridge.loadRequested) bridge.loadRequested.connect(window.vodlink.loadVideo);
      if (bridge.seekRequested) bridge.seekRequested.connect(window.vodlink.seek);
      if (bridge.playRequested) bridge.playRequested.connect(window.vodlink.play);
      if (bridge.pauseRequested) bridge.pauseRequested.connect(window.vodlink.pause);
      if (bridge.messageRequested) bridge.messageRequested.connect(window.vodlink.message);
      if (bridge.cacheRequested) bridge.cacheRequested.connect(window.vodlink.cacheVideos);
      if (bridge.ready) bridge.ready();
    });
  </script>
</body>
</html>
