name: Delete all Actions history

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  delete-runs:
    name: Delete previous workflow runs
    runs-on: ubuntu-latest
    steps:
      - name: Delete every previous Actions run
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const currentRunId = Number(context.runId);
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100 }
            );

            let deleted = 0;
            let skipped = 0;
            for (const run of runs) {
              // GitHub cannot delete the cleanup run while its job is active.
              if (run.id === currentRunId) {
                skipped++;
                continue;
              }

              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
                deleted++;
              } catch (error) {
                core.warning(
                  `Could not delete run ${run.id} (${run.status}): ${error.message}`
                );
                skipped++;
              }
            }

            core.summary
              .addHeading('Actions history cleanup')
              .addRaw(`Deleted ${deleted} previous run(s). Skipped ${skipped} run(s).`)
              .write();
